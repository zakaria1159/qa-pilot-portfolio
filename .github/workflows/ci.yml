# .github/workflows/ci.yml
#
# Runs on every push to main and every pull request.
# Two jobs run in parallel:
#   - unit-tests: Vitest (fast, ~5 seconds)
#   - e2e-tests: Playwright against qa-pilot.com (slower, ~5-10 minutes)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Unit tests (Vitest) ───────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # ── Job 2: E2E tests (Playwright) ───────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Download the Chromium browser binary that Playwright needs
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Run all E2E tests against the live production app.
      # ANTHROPIC_API_KEY is stored as a GitHub repository secret.
      # Add it in: GitHub repo → Settings → Secrets → Actions → New secret
      # Name: ANTHROPIC_API_KEY
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Upload the HTML test report as a downloadable artifact.
      # After CI runs: GitHub Actions → the run → Artifacts → playwright-report
      # Download, open playwright-report/index.html — this is your proof-of-testing artifact.
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
