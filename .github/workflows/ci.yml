# .github/workflows/ci.yml
#
# Runs on every push to main and every pull request.
# Two jobs run in parallel:
#   - unit-tests: Vitest (fast, ~5 seconds, always reliable)
#   - e2e-tests: Playwright, fast subset only (no Claude API calls)
#
# WHY only fast E2E tests in CI:
#   The production app at qa-pilot.com has a rate limiter of 10 Claude API
#   calls per day per IP. A single full test run makes ~33 API calls, so tests
#   beyond the 10th consistently hit 429 and fail. The Claude-dependent tests
#   (step-analyze, step-test, step-code, wizard-flow, resilience) are run
#   locally where the rate limit can be managed. CI covers the deterministic,
#   always-reliable subset.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Unit tests (Vitest) ───────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # ── Job 2: E2E tests — fast subset (no Claude API calls) ────────────────────
  e2e-tests:
    name: E2E Tests (Playwright — fast subset)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Runs only the tests that don't call the Claude API:
      #   - landing.spec.js      — UI only, no API
      #   - step-input.spec.js   — UI only, no API
      #   - api-regression.spec.js — error paths only (405s), no Claude call
      #
      # Claude-dependent tests (step-analyze, step-test, step-code,
      # wizard-flow, resilience) are excluded here because the production
      # rate limiter (10 req/day/IP) makes them unreliable in CI.
      # Run the full suite locally with: npm run test:e2e
      - name: Run fast E2E tests
        run: npx playwright test tests/e2e/landing.spec.js tests/e2e/step-input.spec.js tests/e2e/api-regression.spec.js

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
